<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Демо — ассистент ENERGY</title>
  <link rel="stylesheet" href="energy-chat-widget.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #ededed 0%, #d2daff 100%);
      padding: 32px 20px;
    }
    .demo-note {
      max-width: 560px;
      margin: 0 auto;
      background: #fff;
      padding: 20px 22px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,.08);
    }
    .demo-note h1 { font-size: 1.25rem; margin: 0 0 12px; }
    .demo-note p { margin: 0 0 10px; color: #333; font-size: 15px; line-height: 1.5; }
    .demo-note code { background: #f0f0f0; padding: 2px 6px; border-radius: 6px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="demo-note">
    <h1>Виджет ассистента ENERGY</h1>
    <p>Справа внизу — кнопка чата. Подключение на любую страницу:</p>
    <p><code>&lt;link rel="stylesheet" href="путь/energy-chat-widget.css"&gt;</code></p>
    <p><code>&lt;script src="путь/energy-chat-widget.js"&gt;&lt;/script&gt;</code></p>
    <p><code>&lt;script&gt;EnergyChatWidget.mount({ title: 'ENERGY', subtitle: 'Подбор сценария' });&lt;/script&gt;</code></p>
  </div>
  <script src="energy-chat-widget.js"></script>
  <script>
    EnergyChatWidget.mount({
      title: 'ENERGY',
      subtitle: 'Подбор сценария приёма',
    });
  </script>
</body>
</html>
